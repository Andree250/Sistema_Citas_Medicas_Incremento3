<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Tech - Buscar Citas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-success text-white" style="background-color: #00796b !important;">
                <h3 class="card-title mb-0">Buscar Citas Programadas</h3>
            </div>
            <div class="card-body">
                
                <!-- Formulario del Buscador -->
                <form action="/buscar_citas" method="POST" class="row g-3 align-items-center mb-4">
                    <div class="col-md-8">
                        <input type="text" name="dni" class="form-control" placeholder="Ingrese el DNI del Paciente..." value="{{ dni }}" required>
                    </div>
                    <div class="col-md-4">
                        <button type="submit" class="btn btn-primary w-100" style="background-color: #0d6efd;">Filtrar Citas</button>
                    </div>
                </form>

                <!-- Tabla de Resultados Dinámica -->
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>ID Cita</th>
                                <th>Especialidad</th>
                                <th>Doctor(a)</th>
                                <th>Fecha</th>
                                <th>Hora</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% if citas %}
                                {% for cita in citas %}
                                <tr>
                                    <td><strong>#{{ cita[0] }}</strong></td>
                                    <td>{{ cita[1] }}</td>
                                    <td>{{ cita[2] }}</td>
                                    <td>{{ cita[3] }}</td>
                                    <td><span class="badge bg-info text-dark">{{ cita[4] }}</span></td>
                                    <td class="text-center">
                                        <!-- Formulario inline para cancelar la cita de forma segura -->
                                        <form action="/cancelar_cita/{{ cita[0] }}" method="POST" style="display:inline;" onsubmit="return confirm('¿Está seguro de que desea cancelar esta cita médica?');">
                                            <button type="submit" class="btn btn-danger btn-sm fw-bold">
                                                ❌ Cancelar Cita
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                                {% endfor %}
                            {% else %}
                                <tr>
                                    <td colspan="6" class="text-center text-muted py-3">No se encontraron resultados para la búsqueda ingresada.</td>
                                </tr>
                            {% endif %}
                        </tbody>
                    </table>
                </div>

                <!-- Botón Corregido para regresar al Dashboard -->
                <div class="mt-3">
                    <a href="/dashboard" class="btn btn-secondary btn-sm">Volver al Panel</a>
                </div>

            </div>
        </div>
    </div>
</body>
</html>
