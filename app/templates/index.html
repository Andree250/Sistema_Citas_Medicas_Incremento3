<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Sistema Tech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f7f6; }
        .card-registro { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-custom { background-color: #00796b; color: white; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                
                {% if error %}
                    <div class="alert alert-danger text-center mb-3" role="alert">
                        ⚠️ {{ error }}
                    </div>
                {% endif %}
                {% if exito %}
                    <div class="alert alert-success text-center mb-3" role="alert">
                        ✅ {{ exito }}
                    </div>
                {% endif %}

                <div class="card card-registro p-4">
                    <h3 class="text-center mb-4" style="color: #00796b;">Crear Cuenta</h3>
                    <form action="/crear_usuario" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Nombre Completo</label>
                            <input type="text" name="nombre" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">DNI</label>
                            <input type="text" name="dni" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Correo</label>
                            <input type="email" name="correo" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-custom w-100">Registrarme</button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="/" class="text-decoration-none" style="color: #00796b;">¿Ya tienes cuenta? Inicia sesión</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
