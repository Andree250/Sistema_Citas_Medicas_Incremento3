<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema Tech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card-login { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .btn-custom { background-color: #00796b; color: white; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="card card-login p-4">
        <h2 class="text-center mb-2" style="color: #00796b; font-weight: bold;">SISTEMA TECH</h2>
        <p class="text-center text-muted mb-4">Ingresa tus datos para continuar</p>
        
        {% if error %}
            <div class="alert alert-danger text-center py-2" role="alert">
                ❌ {{ error }}
            </div>
        {% endif %}

        <form action="/login_usuario" method="POST">
            <div class="mb-3">
                <label class="form-label">DNI / Usuario</label>
                <input type="text" name="dni" class="form-control" placeholder="Ingresa tu DNI" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" name="contrasena" class="form-control" placeholder="********" required>
            </div>
            <button type="submit" class="btn btn-custom w-100 py-2">Iniciar Sesión</button>
        </form>
        <div class="text-center mt-3">
            <a href="/registro" class="text-decoration-none" style="color: #00796b;">¿No tienes cuenta? Regístrate</a>
        </div>
    </div>
</body>
</html>
